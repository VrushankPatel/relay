# Relay Configuration
# Provider-Agnostic LLM Caching Proxy

server:
  port: 3000
  host: '0.0.0.0'
  maxConcurrentRequests: 100
  requestTimeoutMs: 30000

# ── Provider Configuration ──
# Choose ONE provider as your upstream LLM backend.
# Caching is most valuable for metered (pay-per-token) providers.
provider:
  # Option 1: OpenAI (recommended for cost savings)
  type: openai
  # apiKey: sk-...  # or set OPENAI_API_KEY env var
  # baseUrl: https://api.openai.com  # default
  # organization: org-...  # optional

  # Option 2: Anthropic
  # type: anthropic
  # apiKey: sk-ant-...  # or set ANTHROPIC_API_KEY env var

  # Option 3: Generic OpenAI-compatible backend
  # type: generic
  # baseUrl: http://localhost:11434  # e.g., Ollama
  # apiKey: optional-key
  # isMeteredPerToken: false  # set true if this backend charges per token

  # Option 4: GitHub Copilot (requires organizational approval)
  # type: copilot
  # requireConsent: true  # default; see COMPLIANCE.md

# ── Cache Configuration ──
cache:
  maxEntries: 10000
  ttlHours: 24

# ── Fuzzy Cache (opt-in, off by default) ──
fuzzyCache:
  enabled: false
  maxTokenEditDistance: 3
  maxEntries: 100
  rapidEditWindowMs: 5000
  rapidEditThreshold: 3

# ── Prefix Cache ──
prefixCache:
  maxEntries: 500

# ── Cache Bypass Rules ──
cacheBypass:
  bypassOnNonZeroTemperature: true
  bypassOnToolsWithSideEffects: true

# ── Deduplication ──
deduplication:
  windowMs: 1000
  maxStreamBufferBytes: 10485760  # 10 MB

# ── Token Budget ──
tokens:
  budgetPerUserPerDay: 1000000
  warningThresholdPercent: 90

# ── Logging ──
logging:
  level: info
  prettyPrint: false

# ── Security ──
security:
  # API key that clients must send to authenticate with Relay
  # Encrypt cache at rest using AES-256-GCM (Recommended: true for security)
  # Negligible CPU cost but prevents sensitive code leaks if disk is compromised.
  encryptCache: true
