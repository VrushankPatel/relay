name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build binaries for ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: node22-macos-arm64
            runner: macos-latest
            output: relay-macos-arm64
          - target: node22-macos-x64
            runner: macos-latest
            output: relay-macos-x64
          - target: node22-linux-x64
            runner: ubuntu-latest
            output: relay-linux-x64
          - target: node22-linux-arm64
            runner: ubuntu-latest
            output: relay-linux-arm64
          - target: node22-win-x64
            runner: windows-latest
            output: relay-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install

      - run: npm run build

      - run: npx pkg dist/index.js --targets ${{ matrix.target }} --output ${{ matrix.output }} -c package.json

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  create-release:
    name: Create GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -laR artifacts/ || echo "No artifacts directory"

      - name: Compute checksums
        run: |
          if [ -d artifacts ]; then
            cd artifacts
            sha256sum relay-* relay-*.exe 2>/dev/null | tee CHECKSUMS.sha256 || true
          else
            echo "No artifacts to checksum" | tee CHECKSUMS.sha256
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Relay ${{ github.ref_name }}
          fail_on_unmatched_files: false
          body: |
            ## Relay ${{ github.ref_name }}

            Download the binary for your platform:

            | Platform | Binary | Checksum |
            |---|---|---|
            | macOS (Apple Silicon) | `relay-macos-arm64` | See `CHECKSUMS.sha256` |
            | macOS (Intel) | `relay-macos-x64` | See `CHECKSUMS.sha256` |
            | Linux (x64) | `relay-linux-x64` | See `CHECKSUMS.sha256` |
            | Linux (arm64) | `relay-linux-arm64` | See `CHECKSUMS.sha256` |
            | Windows (x64) | `relay-windows-x64.exe` | See `CHECKSUMS.sha256` |

            ### Installation

            ```bash
            # macOS / Linux
            chmod +x relay-macos-arm64
            export API_KEY="your-secret-key"
            ./relay-macos-arm64

            # Set your IDE to use http://localhost:8080
            ```

            See [USAGE.md](https://github.com/VrushankPatel/relay/blob/main/USAGE.md) for the full guide.
          files: |
            artifacts/relay-*
            artifacts/CHECKSUMS.sha256
          draft: false
          prerelease: false
